<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>LINK</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      body{
        overflow:hidden;
        background:rgb(0, 0, 0);
        margin:0;
      }
      nav{
        border-bottom:1px solid rgb(78, 78, 78);
        padding:1px;
        background-color: #000000;
      }
     /* リストの点（・）を消して横並びにする */
.nav-list {
  font-size:10px;
  display: flex;
  list-style: none;
  padding: 1px;
  background-color: #000000;
}

/* リンクの間隔と色を整える */
.nav-list li a {
  display: block;
  padding: 5px 20px;
  color: white;
  text-decoration: none;
}
#editor{
width:100vw;
height:89vh;
}
/* ホバー時の色変化 */
.nav-list li a:hover {
  background-color: #555;
}

    </style>
  </head>
  <body>
  <nav class="navbar">
  <ul class="nav-list">
    <li class="nav-item"><a href="#">編集</a></li>
    <li><a href="#">細かな編集</a></li>
    <li><a href="#">対話モード</a></li>
    <li><a href="#">バイナリモード</a></li>
  </ul>
</nav>

  <div id="editor"></div>
<div style="background:teal; width:100vw; height:40px;"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.0/min/vs/loader.min.js"></script>
  <script>
    require.config({
      paths: {
        'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.0/min/vs'
      }
    });

    require(['vs/editor/editor.main'], function () {
      const editor = monaco.editor.create(document.getElementById('editor'), {
        value: [
          'function hello() {',
          '\tconsole.log("Hello, world!");',
          '}',
          '',
          'hello();'
        ].join('\n'),
        language: 'javascript',
        theme: 'vs-dark',
        automaticLayout: true
      });

      // 値を取得する例
      window.getCode = () => {
        console.log(editor.getValue());
      };
    });
  </script>
  </body>
</html>
